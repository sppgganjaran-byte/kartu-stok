<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    src="https://datastudio.google.com/reporting/fe135185-a89a-40fd-a667-eef5e5d5b26f"
    allowfullscreen>
  </iframe>
  <script>
    // Auto request fullscreen saat halaman dibuka
    document.addEventListener("click", () => {
      document.documentElement.requestFullscreen();
    });
  </script>
</body>
</html>
